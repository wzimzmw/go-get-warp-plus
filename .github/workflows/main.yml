
name: WARP-FORCE
on:
  workflow_dispatch:
jobs:
  warp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Auto-Run
        run: |
          # 下载最新的自动化脚本
          wget -O warp.py https://raw.githubusercontent.com/thefated/WARP-Plus-Cloudflare/main/wp-plus.py
          # 运行并强制注入你存好的 ID
          python3 warp.py <<EOF
          ${{ secrets.WARP_ID }}
          EOF
